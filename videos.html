<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Chronicles | Cinema Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            overflow: auto; 
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }




@keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-entrance {
        animation: fadeIn 1.2s ease-out forwards;
    }

    /* The Exit Transition */
    .fade-out {
        transition: opacity 1.5s ease-in-out;
        opacity: 0;
    }





@keyframes cinematicFade {
        0% { opacity: 0; transform: scale(0.95); }
        100% { opacity: 1; transform: scale(1); }
    }
    .animate-cinematic {
        animation: cinematicFade 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }





        #loginOverlay { display: none !important; }

       header {
    padding-top: 5vh !important;
    margin-bottom: 6rem !important;
    opacity: 0; /* Start invisible */
    transition: opacity 1.5s ease-in-out; /* Smooth transition */
}

        #videoLightbox {
            background: rgba(0, 0, 0, 0.9) !important;
            backdrop-filter: blur(15px);
        }

        #playerTitle { display: block !important; } /* Changed to block so you can see video titles */

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; pointer-events: none; }
        
        .folder-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            cursor: pointer; 
        }
        .folder-card:hover { 
            transform: translateY(-8px); 
            border-color: rgba(59, 130, 246, 0.5); 
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.2); 
        }
        
        .reveal { animation: revealUp 0.8s ease forwards; }
       @keyframes revealUp { 
    from { opacity: 0; transform: translateY(30px); } 
    to { opacity: 1; transform: translateY(0); } 
}

.animate-entrance {
    animation: revealUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
        #collectionGrid {
    padding: 2rem;
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 3rem;
    background: rgba(255, 255, 255, 0.01);
}
/* Ensure your font is clean */
h2 {
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.02em;
}
.col-span-full {
        grid-column: 1 / -1 !important;
        width: 100% !important;
    }
    #playerContainer {
    /* Set up the smooth transition for width and height */
    transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    position: relative;
    width: 100%;
    max-width: 1024px; /* Matches your current container */
    height: 500px;
}

/* This class will be added via JS to trigger the "Full Screen" look */
.is-fullscreen {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    max-width: 100vw !important;
    border-radius: 0 !important;
    z-index: 200;
}


/* This class is applied when the player is active */
.lightbox-active {
    transform: scale(1);
    opacity: 1;
}
    </style>
</head>
<body class="custom-scrollbar">

    <div id="mainVault" style="display: block;">
        <canvas id="bg-canvas"></canvas>

        <nav class="absolute top-0 w-full p-8 z-30 flex justify-center gap-10 text-xs uppercase tracking-widest font-bold">
            <a href="index.html" class="hover:text-blue-300 transition">Home</a>
            <a href="gallery.html" class="hover:text-blue-300 transition">Gallery</a>
            <a href="TimeLessVibe.html" class="hover:text-blue-300 transition">TimeLessVibe</a>
            <a href="videos.html" class="text-blue-400 border-b border-blue-400 pb-1">Videos</a>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-20 relative z-10">
            <header class="text-center">
                <h1 class="text-7xl font-black italic mb-4 uppercase leading-none">UN<span class="text-blue-500">WRITTEN</span>CHAPTERS</h1>
                <p id="vaultSubtitle" class="text-gray-500 uppercase tracking-[0.5em] text-[10px] font-bold">2022-2026 MOMENTS</p>
            
            </header>

            <div id="backContainer" class="hidden mb-12">
                <button onclick="loadCollection('main')" class="flex items-center gap-2 text-blue-500 uppercase text-xs font-black tracking-[0.3em] hover:text-white transition">
                    &larr; Back to Memories
                </button>
            </div>

            <div id="collectionGrid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </main>

        <div id="videoLightbox" class="fixed inset-0 z-[100] invisible opacity-0 flex flex-col items-center p-4">
            <div class="w-full flex justify-between items-center p-6 max-w-7xl">
                <div class="flex gap-8 text-[10px] uppercase tracking-[0.3em] font-black">
                    <button onclick="closePlayer(); loadCollection('main')" class="text-blue-500 hover:text-white transition">Home</button>
                    <button onclick="closePlayer()" class="text-gray-400 hover:text-white transition">Back to Memories</button>
                </div>
                <button onclick="closePlayer()" class="text-white/40 hover:text-white text-4xl leading-none">&times;</button>
            </div>

           <div class="w-full max-w-5xl my-auto">
    <div id="playerContainer" class="w-full rounded-[2rem] shadow-2xl border border-white/10 overflow-hidden"></div>
    </div>
        </div>
    </div>

    <script>

// This function talks to your Apps Script and updates your gallery
// Add this variable at the top of your <script>

   
   
  
    const DRIVE_API_URL = "https://script.google.com/macros/s/AKfycbwPOKnHoEQY7p30XnPUZ7eW00vY-4e1OnBw0ChanYK_O1BqgrtMzoLNxSSr4VBnYq5dkQ/exec"; // Use your JSONP/CORS URL
    const grid = document.getElementById('collectionGrid');
    
    // This will hold all your videos once fetched
    let allVideos = [];

    // Run this the moment the page loads
    window.addEventListener('DOMContentLoaded', async () => {
        await fetchAllVideos();
    });

   async function fetchAllVideos() {
    // Hide everything inside the main header so the transition is clean
    const header = document.querySelector('header');
    if (header) header.style.opacity = '0';
    
    // The cinematic title screen
grid.innerHTML = `
        <div id="loadingScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-black animate-entrance">
            <div class="text-center">
                <h2 class="text-white font-black uppercase tracking-[0.1em]" 
                    style="font-size: 2rem; font-family: 'Arial Black', sans-serif;">
                    MOMENTS WAITING FOR YOU
                </h2>
               
            </div>
        </div>
    `;
    
    // ... rest of your existing fetch logic ...

    
    // ... rest of your existing fetch logic ...

    
    // Create a new script element to load the data
    const script = document.createElement('script');
    
    // Define the global function the script will call
    window.handleDriveData = (data) => {
        allVideos = data.map(v => ({ driveId: v.id, title: v.title, type: "video" }));
        renderGrid(allVideos);
        document.body.removeChild(script); // Clean up
    };
    
    // Set the source (add &callback=handleDriveData)
    script.src = DRIVE_API_URL + "?callback=handleDriveData";
    document.body.appendChild(script);
}

function renderGrid(data) {
    console.log("Rendering data, count:", data.length); // CHECK CONSOLE: Does it show a number > 0?

    const loadingScreen = document.getElementById('loadingScreen');
    if (loadingScreen) {
        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
            loadingScreen.remove();
        }, 1500);
    }
    
    // 1. Force Header to show immediately
    const header = document.querySelector('header');
    if (header) {
        header.style.display = 'block';
        header.style.opacity = '1';
    }
    
    // 2. Clear grid
    grid.innerHTML = '';
    
    // 3. Collection Map
    const collections = [
        { name: "FARMHOUSE FUN", tag: "FARMHOUSE" },
        { name: "SIGNATURE DAY", tag: "SIGNATURE" },
        { name: "FAREWELL DAY", tag: "FAREWELL" }
        
    ];

    // 4. Build the grid
    let foundAny = false;
    collections.forEach(coll => {
        const filtered = data.filter(v => v.title && v.title.toUpperCase().includes(coll.tag));
        
        if (filtered.length > 0) {
            foundAny = true;
            // Add Header
            grid.innerHTML += `
                <div class="col-span-full mt-16 mb-8 border-l-4 border-blue-500 pl-6 w-full">
                    <h2 class="text-white font-black text-3xl uppercase tracking-[0.2em]">${coll.name}</h2>
                </div>
            `;
            
            // Add Cards
          filtered.forEach((item) => {
    const action = `openPlayer('${item.driveId}', '${item.title}')`;
    const thumbSrc = `https://lh3.googleusercontent.com/d/${item.driveId}=w600`;
    
    grid.innerHTML += `
        <div onclick="${action}" class="folder-card p-3 rounded-[2.5rem] cursor-pointer group overflow-hidden transition-all duration-500 hover:scale-[1.02]">
            <div class="aspect-video bg-gray-900 rounded-[2rem] overflow-hidden relative shadow-lg">
                <img src="${thumbSrc}" 
                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <span class="text-4xl text-white">▶</span>
                </div>
            </div>
            </div>`;
});
        }
    });

    if (!foundAny) {
        grid.innerHTML = `<p class="text-white text-center col-span-full mt-10">No videos found with matching tags.</p>`;
    }
}

    // ... your openPlayer and closePlayer functions ...


function openPlayer(driveId, title) {
    const lightbox = document.getElementById('videoLightbox');
    const playerContainer = document.getElementById('playerContainer');
    
    playerContainer.innerHTML = '';
    
    // Switch to the 'embedded' format which is much more reliable for streaming
    const embedUrl = `https://drive.google.com/file/d/${driveId}/preview`;
    
    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.className = "w-full h-[500px] rounded-[2rem] border-0";
    
    // Add all permissions needed to allow the video to initialize
    iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
    iframe.setAttribute('allowfullscreen', 'true');
    
    playerContainer.appendChild(iframe);
    
    lightbox.classList.remove('invisible', 'opacity-0');
    document.body.style.overflow = 'hidden';
}

   function closePlayer() {
    // 1. Hide the lightbox
    const lightbox = document.getElementById('videoLightbox');
    lightbox.classList.add('invisible', 'opacity-0');
    
    // 2. IMPORTANT: This physically removes the player from the DOM,
    // which forces the video to stop playing and clear its memory.
    const playerContainer = document.getElementById('playerContainer');
    playerContainer.innerHTML = ''; 
    
    // 3. Reset page scrolling
    document.body.style.overflow = 'auto';
}
// Add this dummy function so the error goes away
function loadCollection(key) {
    console.log("Collection requested: " + key);
    // If you want the main page to load, just call the fetcher
    if(key === 'main') fetchAllVideos();
}
function toggleFullScreen() {
    const elem = document.getElementById('playerContainer');
    
    // Check if we are already in fullscreen
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        // Request Fullscreen with a smooth transition
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }
        
        // Add a class for any custom CSS styling during fullscreen
        elem.classList.add('fullscreen-mode');
    } else {
        // Exit Fullscreen
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
        
        elem.classList.remove('fullscreen-mode');
    }
}

// Add an event listener to detect when the user hits 'ESC' key to exit
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
        document.getElementById('playerContainer').classList.remove('fullscreen-mode');
    }
});

    loadCollection('main');
</script>
</body>
</html>

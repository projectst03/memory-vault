<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Chronicles | Cinema Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
   <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; color: white;
            -webkit-user-select: none; user-select: none;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 10px; }
        
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0px); }
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .animate-slow-zoom { animation: slowZoom 20s infinite alternate linear; }

        .reveal { 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }
        .reveal:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 15px rgba(59, 130, 246, 0.2);
            z-index: 10;
        }

        #lightbox { transition: opacity 1.2s ease; background-color: #000; }
        #lightboxImg, #videoContainer { 
            transition: opacity 3.0s ease-in-out, transform 4.0s cubic-bezier(0.1, 0, 0.3, 1), filter 3.0s ease-out !important;
            opacity: 0; transform: scale(0.92); filter: blur(15px);
        }
        .media-active { opacity: 1 !important; transform: scale(1.04) !important; filter: blur(0px) !important; }
        #lightboxImg { width: auto; height: auto; max-width: 100vw !important; max-height: 100vh !important; object-fit: contain; }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 16px;
            border-radius: 99px; font-size: 10px; font-weight: 800;
            letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.3s;
        }
        .glass-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        
        .nav-zone { height: 100%; width: 15%; position: absolute; top: 0; display: flex; align-items: center; justify-content: center; z-index: 140; cursor: pointer; opacity: 0; transition: opacity 0.3s; font-size: 3rem; color: white; }
        .nav-zone:hover { opacity: 0.4; background: rgba(255,255,255,0.05); }
        .nav-zone.left { left: 0; }
        .nav-zone.right { right: 0; }

        #songList { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(20px); opacity: 0; pointer-events: none; max-height: 0; }
        #songList.active { transform: translateY(0); opacity: 1; pointer-events: auto; max-height: 400px; margin-bottom: 12px; }
        
        .song-item { transition: all 0.3s; border-left: 0px solid #3b82f6; }
        .song-item:hover { background: rgba(59, 130, 246, 0.15); border-left: 3px solid #3b82f6; padding-left: 12px; color: white; }
        .active-track { color: #3b82f6 !important; font-weight: 900; }
        .playing-pulse { animation: pulse-blue 2s infinite; }
        
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        @keyframes cinematicZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .animate-vault-zoom { animation: cinematicZoom 12s ease-in-out infinite; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
        .heart-symbol { position: absolute; color: #ef4444; font-size: 3rem; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 200; }
          
        /* =======================================================
           EXACT SITE SPECIFICATIONS ALIGNMENT OVERRIDES (MOBILE)
           ======================================================= */
        @media screen and (max-width: 768px) {
            nav {
                padding: 1rem !important;              /* Matches reference page p-4 layout exactly */
                gap: 1rem !important;                  /* Matches reference page gap-4 link spacing */
            }

            nav a {
                font-size: 10px !important;            /* Matches text-[10px] layout size */
                letter-spacing: 0.1em !important;      /* Matches tracking-widest specs */
                padding-bottom: 4px !important;       /* Matches pb-1 clearance */
            }

            h1, .text-7xl {
                font-size: 1.75rem !important;         /* Adjusted down slightly so the 17-letter word fits across screens */
                line-height: 1 !important;              /* Matches leading-none precisely */
                margin-bottom: 1rem !important;        /* Matches mb-4 precisely */
                letter-spacing: -0.05em !important;    /* Matches tracking-tighter precisely */
                word-break: break-all !important;       /* Clean fallback protection */
            }

            header {
                padding-top: 0px !important;           /* Neutralizes vertical placement offsets */
                padding-bottom: 2.5rem !important;    /* Matches reference page pb-10 spacing layout */
            }

            #vaultSubtitle {
                font-size: 10px !important;            /* Matches subtitle font size bounds */
                letter-spacing: 0.4em !important;      /* Matches tracking-[0.4em] scaling spacing */
            }
        }
    </style>
</head>
<body class="custom-scrollbar overflow-x-hidden">

    <div id="mainVault" style="display: block;">
        <canvas id="bg-canvas"></canvas>

        <nav class="absolute top-0 w-full p-8 z-30 flex justify-center gap-10 text-xs uppercase tracking-widest font-bold">
            <a href="index.html" class="hover:text-blue-300 transition">Home</a>
            <a href="gallery.html" class="hover:text-blue-300 transition">Gallery</a>
            <a href="TimeLessVibe.html" class="hover:text-blue-300 transition">TimeLessVibe</a>
            <a href="videos.html" class="text-blue-400 border-b border-blue-400 pb-1">Videos</a>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-20 relative z-10">
          <header class="text-center pt-17 pb-10 px-2">
        <div class="inline-block transform transition-transform duration-500 hover:scale-105">
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tighter italic mb-4 uppercase leading-none">
                UNWRITTEN<span class="text-blue-500">CHAPTERS</span>
            </h1>
            <p id="vaultSubtitle" class="text-gray-500 uppercase tracking-[0.35em] sm:tracking-[0.5em] text-[9px] sm:text-[10px] font-bold">MOMENTS WAITING FOR YOU...</p>
        </div>
    </header>

            <div id="backContainer" class="hidden mb-12">
                <button onclick="loadCollection('main')" class="flex items-center gap-2 text-blue-500 uppercase text-xs font-black tracking-[0.3em] hover:text-white transition">
                    &larr; Back to Memories
                </button>
            </div>

            <div id="collectionGrid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </main>

        <div id="videoLightbox" class="fixed inset-0 z-[100] invisible opacity-0 flex flex-col items-center p-4">
            <div class="w-full flex justify-between items-center p-6 max-w-7xl">
                <div class="flex gap-8 text-[10px] uppercase tracking-[0.3em] font-black">
                    <button onclick="closePlayer(); loadCollection('main')" class="text-blue-500 hover:text-white transition">Home</button>
                    <button onclick="closePlayer()" class="text-gray-400 hover:text-white transition">Back to Memories</button>
                </div>
                <button onclick="closePlayer()" class="text-white/40 hover:text-white text-4xl leading-none">&times;</button>
            </div>

           <div class="w-full max-w-5xl my-auto">
    <div id="playerContainer" class="w-full rounded-[2rem] shadow-2xl border border-white/10 overflow-hidden"></div>
    </div>
        </div>
    </div>

    <script>

// This function talks to your Apps Script and updates your gallery
// Add this variable at the top of your <script>

   
   
  
    const DRIVE_API_URL = "https://script.google.com/macros/s/AKfycbwPOKnHoEQY7p30XnPUZ7eW00vY-4e1OnBw0ChanYK_O1BqgrtMzoLNxSSr4VBnYq5dkQ/exec"; // Use your JSONP/CORS URL
    const grid = document.getElementById('collectionGrid');
    
    // This will hold all your videos once fetched
    let allVideos = [];

    // Run this the moment the page loads
    window.addEventListener('DOMContentLoaded', async () => {
        await fetchAllVideos();
    });

   async function fetchAllVideos() {
    // Hide everything inside the main header so the transition is clean
    const header = document.querySelector('header');
    if (header) header.style.opacity = '0';
    
    // The cinematic title screen
grid.innerHTML = `
        <div id="loadingScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-black animate-entrance">
            <div class="text-center">
                <h2 class="text-white font-black uppercase tracking-[0.1em]" 
                    style="font-size: 2rem; font-family: 'Arial Black', sans-serif;">
                    MOMENTS WAITING FOR YOU
                </h2>
               
            </div>
        </div>
    `;
    
    // ... rest of your existing fetch logic ...

    
    // ... rest of your existing fetch logic ...

    
    // Create a new script element to load the data
    const script = document.createElement('script');
    
    // Define the global function the script will call
    window.handleDriveData = (data) => {
        allVideos = data.map(v => ({ driveId: v.id, title: v.title, type: "video" }));
        renderGrid(allVideos);
        document.body.removeChild(script); // Clean up
    };
    
    // Set the source (add &callback=handleDriveData)
    script.src = DRIVE_API_URL + "?callback=handleDriveData";
    document.body.appendChild(script);
}

function renderGrid(data) {
    console.log("Rendering data, count:", data.length); // CHECK CONSOLE: Does it show a number > 0?

    const loadingScreen = document.getElementById('loadingScreen');
    if (loadingScreen) {
        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
            loadingScreen.remove();
        }, 1500);
    }
    
    // 1. Force Header to show immediately
    const header = document.querySelector('header');
    if (header) {
        header.style.display = 'block';
        header.style.opacity = '1';
    }
    
    // 2. Clear grid
    grid.innerHTML = '';
    
    // 3. Collection Map
    const collections = [
         { name: "WHITE COLLECTION", tag: "WHITE" },
        { name: "TRADITIONAL GALA", tag: "TRADITIONAL" },
        { name: "SIGNATURE DAY", tag: "SIGNATURE" },
        { name: "FAREWELL DAY", tag: "FAREWELL" },
        { name: "PAGES FROM THE PAST", tag: "PAGES FROM PAST" },
        { name: "FARMHOUSE FUN", tag: "FARMHOUSE" }

    ];

    // 4. Build the grid
    let foundAny = false;
    collections.forEach(coll => {
        const filtered = data.filter(v => v.title && v.title.toUpperCase().includes(coll.tag));
        
        if (filtered.length > 0) {
            foundAny = true;
            // Add Header
            grid.innerHTML += `
                <div class="col-span-full mt-16 mb-8 border-l-4 border-blue-500 pl-6 w-full">
                    <h2 class="text-white font-black text-3xl uppercase tracking-[0.2em]">${coll.name}</h2>
                </div>
            `;
            
            // Add Cards
          filtered.forEach((item) => {
    const action = `openPlayer('${item.driveId}', '${item.title}')`;
    const thumbSrc = `https://lh3.googleusercontent.com/d/${item.driveId}=w600`;
    
    grid.innerHTML += `
        <div onclick="${action}" class="folder-card p-3 rounded-[2.5rem] cursor-pointer group overflow-hidden transition-all duration-500 hover:scale-[1.02]">
            <div class="aspect-video bg-gray-900 rounded-[2rem] overflow-hidden relative shadow-lg">
                <img src="${thumbSrc}" 
                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <span class="text-4xl text-white">▶</span>
                </div>
            </div>
            </div>`;
});
        }
    });

    if (!foundAny) {
        grid.innerHTML = `<p class="text-white text-center col-span-full mt-10">No videos found with matching tags.</p>`;
    }
}

    // ... your openPlayer and closePlayer functions ...


function openPlayer(driveId, title) {
    const lightbox = document.getElementById('videoLightbox');
    const playerContainer = document.getElementById('playerContainer');
    
    playerContainer.innerHTML = '';
    
    // Switch to the 'embedded' format which is much more reliable for streaming
    const embedUrl = `https://drive.google.com/file/d/${driveId}/preview`;
    
    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.className = "w-full h-[500px] rounded-[2rem] border-0";
    
    // Add all permissions needed to allow the video to initialize
    iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
    iframe.setAttribute('allowfullscreen', 'true');
    
    playerContainer.appendChild(iframe);
    
    lightbox.classList.remove('invisible', 'opacity-0');
    document.body.style.overflow = 'hidden';
}

   function closePlayer() {
    // 1. Hide the lightbox
    const lightbox = document.getElementById('videoLightbox');
    lightbox.classList.add('invisible', 'opacity-0');
    
    // 2. IMPORTANT: This physically removes the player from the DOM,
    // which forces the video to stop playing and clear its memory.
    const playerContainer = document.getElementById('playerContainer');
    playerContainer.innerHTML = ''; 
    
    // 3. Reset page scrolling
    document.body.style.overflow = 'auto';
}
// Add this dummy function so the error goes away
function loadCollection(key) {
    console.log("Collection requested: " + key);
    // If you want the main page to load, just call the fetcher
    if(key === 'main') fetchAllVideos();
}
function toggleFullScreen() {
    const elem = document.getElementById('playerContainer');
    
    // Check if we are already in fullscreen
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        // Request Fullscreen with a smooth transition
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }
        
        // Add a class for any custom CSS styling during fullscreen
        elem.classList.add('fullscreen-mode');
    } else {
        // Exit Fullscreen
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
        
        elem.classList.remove('fullscreen-mode');
    }
}

// Add an event listener to detect when the user hits 'ESC' key to exit
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
        document.getElementById('playerContainer').classList.remove('fullscreen-mode');
    }
});

    loadCollection('main');
</script>
</body>
</html>
